name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          cards=""
          for dir in */; do
            dir="${dir%/}"
            spec="$dir/$dir.md"
            html="$dir/index.html"
            [ -f "$spec" ] && [ -f "$html" ] || continue

            name=$(head -1 "$spec" | sed 's/^# //')
            desc=$(sed -n '3p' "$spec" | sed 's/^> //')
            accent=$(grep -m1 '\--accent:' "$html" | sed 's/.*\(#[0-9A-Fa-f]\{6\}\).*/\1/')
            accent2=$(grep -m1 '\--accent2:' "$html" | sed 's/.*\(#[0-9A-Fa-f]\{6\}\).*/\1/')
            danger=$(grep -m1 '\--danger:' "$html" | sed 's/.*\(#[0-9A-Fa-f]\{6\}\).*/\1/')
            bg=$(grep -m1 '\--bg:' "$html" | sed 's/.*\(#[0-9A-Fa-f]\{6\}\).*/\1/')
            surface=$(grep -m1 '\--surface:' "$html" | sed 's/.*\(#[0-9A-Fa-f]\{6\}\).*/\1/')

            cards="$cards
              <a class=\"theme-card\" href=\"$dir/\">
                <div class=\"name\">$name</div>
                <div class=\"desc\">$desc</div>
                <div class=\"colors\">
                  <div class=\"swatch\" style=\"background: $accent\"></div>
                  <div class=\"swatch\" style=\"background: $accent2\"></div>
                  <div class=\"swatch\" style=\"background: $danger\"></div>
                  <div class=\"swatch\" style=\"background: $bg\"></div>
                  <div class=\"swatch\" style=\"background: $surface\"></div>
                </div>
              </a>"
          done

          cat > index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Ghost Signal — Audio Themes</title>
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            :root {
              --bg: #0A0A0C; --surface: #111116; --surface2: #1A1A22;
              --border: #2A2A35; --text: #E0E0E8; --text-dim: #6A6A78;
              --accent: #FCEE0A; --accent2: #00F0FF;
              --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
              --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            }
            body { background: var(--bg); color: var(--text); font-family: var(--font); line-height: 1.5; min-height: 100vh; }
            body::after {
              content: ''; position: fixed; inset: 0;
              background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
              pointer-events: none; z-index: 9999;
            }
            .container { max-width: 640px; margin: 0 auto; padding: 60px 24px 80px; }
            header { text-align: center; margin-bottom: 48px; }
            header h1 {
              font-size: 2.4rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
              color: var(--accent); text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 30%, transparent);
            }
            header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 8px; letter-spacing: 0.05em; }
            .theme-list { display: flex; flex-direction: column; gap: 12px; }
            .theme-card {
              display: block; background: var(--surface); border: 1px solid var(--border);
              border-radius: 6px; padding: 20px 24px; text-decoration: none; color: var(--text);
              transition: all 0.15s; position: relative; overflow: hidden;
            }
            .theme-card::before {
              content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
              background: var(--accent2); opacity: 0; transition: opacity 0.15s;
            }
            .theme-card:hover { border-color: var(--accent2); background: var(--surface2); }
            .theme-card:hover::before { opacity: 1; }
            .theme-card .name { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
            .theme-card .desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }
            .theme-card .colors { display: flex; gap: 4px; margin-top: 10px; }
            .theme-card .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid var(--border); }
            footer {
              text-align: center; margin-top: 48px; font-size: 0.7rem;
              color: var(--text-dim); font-family: var(--mono); letter-spacing: 0.05em;
            }
            footer a { color: var(--accent2); text-decoration: none; }
            footer a:hover { text-decoration: underline; }
          </style>
          </head>
          <body>
          <div class="container">
            <header>
              <h1>Ghost Signal</h1>
              <p>Browser audio themes — Web Audio API synthesis</p>
            </header>
            <div class="theme-list">
          $cards
            </div>
            <footer>16 sounds per theme — zero dependencies — <a href="https://github.com/wk-j/ghost-signal">source</a></footer>
          </div>
          </body>
          </html>
          HTMLEOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
