<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Signal — Audio Theme</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:   #FCEE0A;
    --accent2:  #00F0FF;
    --danger:   #FF2D6B;
    --bg:       #0A0A0C;
    --surface:  #111116;
    --surface2: #1A1A22;
    --border:   #2A2A35;
    --text:     #E0E0E8;
    --text-dim: #6A6A78;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ─────────────────────────────────────────── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  header { text-align: center; margin-bottom: 48px; }
  header h1 {
    font-size: 2.4rem; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 30%, transparent);
  }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 8px; letter-spacing: 0.05em; }

  /* ── Init banner ──────────────────────────────────────────────── */
  .init-banner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 24px; margin-bottom: 40px;
    text-align: center; cursor: pointer; transition: border-color 0.2s;
  }
  .init-banner:hover { border-color: var(--accent2); }
  .init-banner.ready { border-color: var(--accent2); opacity: 0.5; pointer-events: none; }
  .init-banner code { color: var(--accent2); font-family: var(--mono); }

  /* ── Sections ─────────────────────────────────────────────────── */
  section { margin-bottom: 48px; }
  section h2 {
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--accent2); border-bottom: 1px solid var(--border);
    padding-bottom: 8px; margin-bottom: 20px;
  }

  .sound-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  /* ── Sound button cards ───────────────────────────────────────── */
  .sound-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px; cursor: pointer;
    transition: all 0.15s; text-align: left;
    color: var(--text); font-family: var(--font);
    position: relative; overflow: hidden;
  }
  .sound-btn::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%; background: var(--accent2);
    opacity: 0; transition: opacity 0.15s;
  }
  .sound-btn:hover { border-color: var(--accent2); background: var(--surface2); }
  .sound-btn:hover::before { opacity: 1; }
  .sound-btn:active { transform: scale(0.97); border-color: var(--accent); }
  .sound-btn:active::before { background: var(--accent); opacity: 1; }

  .sound-btn .label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .sound-btn .meta  { font-size: 0.65rem; color: var(--text-dim); font-family: var(--mono); margin-top: 4px; }
  .sound-btn .desc  { font-size: 0.7rem; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }

  /* ── Toggle switch ────────────────────────────────────────────── */
  .toggle-row {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 14px 16px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.15s; user-select: none;
  }
  .toggle-row:hover { border-color: var(--accent2); }

  .toggle-track {
    width: 44px; height: 22px; background: var(--border);
    border-radius: 11px; position: relative; flex-shrink: 0; transition: background 0.2s;
  }
  .toggle-track::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; background: var(--text-dim);
    border-radius: 50%; transition: all 0.2s;
  }
  .toggle-row.on .toggle-track { background: var(--accent2); }
  .toggle-row.on .toggle-track::after { left: 25px; background: var(--bg); }

  .toggle-info .label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .toggle-info .meta  { font-size: 0.65rem; color: var(--text-dim); font-family: var(--mono); }

  /* ── Tab bar ──────────────────────────────────────────────────── */
  .tab-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }

  .tab-strip { display: flex; gap: 4px; align-items: center; min-height: 36px; flex-wrap: wrap; }

  .tab-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px; font-size: 0.72rem;
    font-family: var(--mono); color: var(--text);
    display: flex; align-items: center; gap: 8px;
    cursor: default; transition: border-color 0.15s;
    animation: tabIn 0.15s ease-out;
  }
  .tab-item:hover { border-color: var(--accent2); }
  @keyframes tabIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tab-item .tab-close {
    width: 14px; height: 14px; border-radius: 3px; border: none;
    background: transparent; color: var(--text-dim); font-size: 0.7rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; line-height: 1; padding: 0;
  }
  .tab-item .tab-close:hover { background: var(--danger); color: #fff; }

  .tab-controls { display: flex; gap: 8px; margin-top: 10px; }

  .tab-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 14px; font-size: 0.72rem;
    font-family: var(--mono); color: var(--text); cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Keyboard input ───────────────────────────────────────────── */
  .keyboard-area { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }

  .keyboard-area label {
    font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.1em; display: block; margin-bottom: 8px;
  }
  .keyboard-area textarea {
    width: 100%; min-height: 120px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--accent2); font-family: var(--mono); font-size: 0.85rem;
    padding: 12px; resize: vertical; outline: none;
    transition: border-color 0.15s; caret-color: var(--accent); line-height: 1.6;
  }
  .keyboard-area textarea:focus { border-color: var(--accent2); }
  .keyboard-area textarea::placeholder { color: var(--text-dim); }

  .key-indicators { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .key-ind {
    padding: 4px 10px; border-radius: 4px; font-size: 0.65rem;
    font-family: var(--mono); background: var(--surface2);
    border: 1px solid var(--border); color: var(--text-dim); transition: all 0.08s;
  }
  .key-ind.flash {
    border-color: var(--accent); color: var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
  }

  /* ── Toast indicator ──────────────────────────────────────────── */
  .wave-flash {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 14px;
    font-family: var(--mono); font-size: 0.65rem; color: var(--accent2);
    opacity: 0; transform: translateY(8px); transition: all 0.15s;
    pointer-events: none; z-index: 100;
  }
  .wave-flash.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1 id="themeName">Loading...</h1>
    <p id="themeSubtitle"></p>
  </header>

  <div class="init-banner" id="initBanner" onclick="initAudio()">
    Click to initialise <code>AudioContext</code>
  </div>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BROWSER SOUNDS                                              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <section>
    <h2>Browser Sounds</h2>
    <div class="sound-grid" id="soundGrid"></div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TOGGLE SOUNDS                                               -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <section>
    <h2>Toggle Sounds</h2>
    <div id="toggleList"></div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- TAB SOUNDS                                                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <section>
    <h2>Tab Sounds</h2>
    <div class="tab-bar">
      <div class="tab-strip" id="tabStrip"></div>
      <div class="tab-controls">
        <button class="tab-btn" onclick="addTab()"  onmouseenter="play('HOVER')" onmouseleave="play('HOVER_UP')">+ New Tab</button>
        <button class="tab-btn" onclick="slashTab()" onmouseenter="play('HOVER')" onmouseleave="play('HOVER_UP')">/ Slash</button>
      </div>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- KEYBOARD SOUNDS                                             -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <section>
    <h2>Keyboard Sounds</h2>
    <div class="keyboard-area">
      <label>Type here &mdash; each key triggers its sound</label>
      <textarea id="typingArea" placeholder=""></textarea>
      <div class="key-indicators">
        <div class="key-ind" id="indLetter">LETTER</div>
        <div class="key-ind" id="indSpace">SPACE</div>
        <div class="key-ind" id="indBackspace">BACKSPACE</div>
        <div class="key-ind" id="indEnter">ENTER</div>
      </div>
    </div>
  </section>
</div>

<div class="wave-flash" id="waveFlash"></div>

<script type="module">
// ═══════════════════════════════════════════════════════════════════
// THEME LOADER — reads ?theme= param and imports the module
// ═══════════════════════════════════════════════════════════════════

const params = new URLSearchParams(location.search);
const themeName = params.get('theme');

if (!themeName) {
  document.getElementById('themeName').textContent = 'No theme specified';
  document.getElementById('themeSubtitle').textContent = 'Use ?theme=<name> to load a theme';
}

let theme = null;

if (themeName) {
  try {
    const mod = await import(`./${themeName}/sounds.js`);
    theme = mod.default;
  } catch (e) {
    document.getElementById('themeName').textContent = 'Theme not found';
    document.getElementById('themeSubtitle').textContent = `Could not load "${themeName}/sounds.js"`;
  }
}


// ═══════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════════

let ctx = null;
let sounds = {};

function noiseBuffer(duration = 0.1) {
  const len = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

window.initAudio = function() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (theme) {
    sounds = theme.createSounds(ctx, noiseBuffer);
  }
  document.getElementById('initBanner').classList.add('ready');
  document.getElementById('initBanner').textContent = 'AudioContext ready';
  flash('AudioContext initialised');
};

function ensureCtx() {
  if (!ctx) window.initAudio();
  if (ctx.state === 'suspended') ctx.resume();
}

function flash(text) {
  const el = document.getElementById('waveFlash');
  el.textContent = '> ' + text;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 800);
}

window.play = function(id) {
  ensureCtx();
  if (sounds[id]) { sounds[id](); flash(id); }
};


// ═══════════════════════════════════════════════════════════════════
// UI — Toggle Switches
// ═══════════════════════════════════════════════════════════════════

window.toggleSwitch = function(el, type) {
  const isOn = el.classList.toggle('on');
  if (type === 'SWITCH_TOGGLE') {
    play('SWITCH_TOGGLE');
  } else {
    play(isOn ? type + '_ON' : type + '_OFF');
  }
};


// ═══════════════════════════════════════════════════════════════════
// UI — Tab Bar
// ═══════════════════════════════════════════════════════════════════

let tabCounter = 0;

window.addTab = function() {
  tabCounter++;
  play('TAB_INSERT');
  const strip = document.getElementById('tabStrip');
  const tab = document.createElement('div');
  tab.className = 'tab-item';
  tab.innerHTML = `<span>Tab ${tabCounter}</span><button class="tab-close" onclick="closeTab(event, this)">&times;</button>`;
  strip.appendChild(tab);
};

window.closeTab = function(e, btn) {
  e.stopPropagation();
  play('TAB_CLOSE');
  const tab = btn.parentElement;
  tab.style.opacity = '0';
  tab.style.transform = 'scale(0.9)';
  tab.style.transition = 'all 0.12s';
  setTimeout(() => tab.remove(), 120);
};

window.slashTab = function() { play('TAB_SLASH'); };


// ═══════════════════════════════════════════════════════════════════
// UI — Keyboard Input
// ═══════════════════════════════════════════════════════════════════

const typingArea = document.getElementById('typingArea');
const indicators = {
  letter:    document.getElementById('indLetter'),
  space:     document.getElementById('indSpace'),
  backspace: document.getElementById('indBackspace'),
  enter:     document.getElementById('indEnter'),
};

function flashIndicator(key) {
  const el = indicators[key];
  if (!el) return;
  el.classList.add('flash');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('flash'), 120);
}

typingArea.addEventListener('keydown', (e) => {
  ensureCtx();
  if      (e.key === 'Backspace')  { play('TYPING_BACKSPACE'); flashIndicator('backspace'); }
  else if (e.key === 'Enter')      { play('TYPING_ENTER');     flashIndicator('enter');     }
  else if (e.key === ' ')          { play('TYPING_SPACE');     flashIndicator('space');     }
  else if (e.key.length === 1)     { play('TYPING_LETTER');    flashIndicator('letter');    }
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== typingArea) {
    e.preventDefault();
    play('TAB_SLASH');
    typingArea.focus();
  }
});


// ═══════════════════════════════════════════════════════════════════
// RENDER THEME — apply meta to page
// ═══════════════════════════════════════════════════════════════════

if (theme) {
  const meta = theme.meta;

  // Title
  document.title = `${meta.name} — Audio Theme`;
  document.getElementById('themeName').textContent = meta.name;
  document.getElementById('themeSubtitle').textContent = meta.subtitle;

  // Colors
  const root = document.documentElement.style;
  root.setProperty('--accent',   meta.colors.accent);
  root.setProperty('--accent2',  meta.colors.accent2);
  root.setProperty('--danger',   meta.colors.danger);
  root.setProperty('--bg',       meta.colors.bg);
  root.setProperty('--surface',  meta.colors.surface);
  root.setProperty('--surface2', meta.colors.surface2);
  root.setProperty('--border',   meta.colors.border);
  root.setProperty('--text',     meta.colors.text);
  root.setProperty('--text-dim', meta.colors.textDim);

  // Placeholder
  typingArea.placeholder = meta.placeholder || '';

  // Browser sound buttons
  const grid = document.getElementById('soundGrid');
  const browserBtns = [
    { id: 'HOVER',           onclick: null },
    { id: 'HOVER_UP',        onclick: null },
    { id: 'CLICK',           onclick: 'CLICK' },
    { id: 'IMPORTANT_CLICK', onclick: 'IMPORTANT_CLICK' },
    { id: 'TAB_SLASH',       onclick: 'TAB_SLASH' },
  ];
  browserBtns.forEach((btn) => {
    const info = meta.sounds[btn.id];
    if (!info) return;
    const el = document.createElement('button');
    el.className = 'sound-btn';
    el.setAttribute('onmouseenter', "play('HOVER')");
    el.setAttribute('onmouseleave', "play('HOVER_UP')");
    if (btn.onclick) el.setAttribute('onclick', `play('${btn.onclick}')`);
    el.innerHTML = `<div class="label">${info.label}</div><div class="meta">${info.meta}</div><div class="desc">${info.desc}</div>`;
    grid.appendChild(el);
  });

  // Toggle switches
  const toggleList = document.getElementById('toggleList');
  const toggles = [
    { type: 'FEATURE_SWITCH', id: 'FEATURE_SWITCH_ON' },
    { type: 'LIMITER',        id: 'LIMITER_ON' },
    { type: 'SWITCH_TOGGLE',  id: 'SWITCH_TOGGLE' },
  ];
  toggles.forEach((tog) => {
    const info = meta.sounds[tog.id];
    if (!info) return;
    const el = document.createElement('div');
    el.className = 'toggle-row';
    el.setAttribute('onclick', `toggleSwitch(this, '${tog.type}')`);
    el.setAttribute('onmouseenter', "play('HOVER')");
    el.setAttribute('onmouseleave', "play('HOVER_UP')");
    el.innerHTML = `<div class="toggle-track"></div><div class="toggle-info"><div class="label">${info.label}</div><div class="meta">${info.meta}</div></div>`;
    toggleList.appendChild(el);
  });
}
</script>
</body>
</html>
